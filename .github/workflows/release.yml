name: Release

# Push a version tag (e.g. 1.0.0 — no leading "v") to build every platform and
# publish a GitHub Release with a commit-based changelog and the binaries.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can build a changelog

      - name: Build release notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Prefer the matching section from CHANGELOG.md.
          if [ -f CHANGELOG.md ]; then
            awk -v hdr="## [$TAG]" '
              index($0, hdr) == 1 { flag=1; next }
              flag && index($0, "## [") == 1 { flag=0 }
              flag
            ' CHANGELOG.md > NOTES.md
          fi
          # Fall back to the commit log if there is no CHANGELOG entry.
          if [ ! -s NOTES.md ]; then
            PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")"
            {
              echo "## Changelog"
              echo ""
              if [ -n "$PREV" ]; then
                git log "${PREV}..${TAG}" --no-merges --pretty=format:'- %s'
              else
                git log "${TAG}" --no-merges --pretty=format:'- %s'
              fi
              echo ""
            } > NOTES.md
          fi
          echo "----- notes -----"; cat NOTES.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file NOTES.md \
            --latest \
            --verify-tag

  build:
    name: ${{ matrix.label }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: typebridge.exe
            label: windows-x86_64
            ext: .exe
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bin: typebridge.exe
            label: windows-arm64
            ext: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: typebridge
            label: linux-x86_64
            ext: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bin: typebridge
            label: linux-arm64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: typebridge
            label: macos-arm64
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: typebridge
            label: macos-x86_64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          ASSET="typebridge-${GITHUB_REF_NAME}-${{ matrix.label }}${{ matrix.ext }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$ASSET"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "$ASSET" --repo "${GITHUB_REPOSITORY}" --clobber
